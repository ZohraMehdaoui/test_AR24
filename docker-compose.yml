version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: ar24_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ar24_php
    volumes:
      - ./:/var/www
    environment:
      APP_ENV: dev

  mailhog:
    image: mailhog/mailhog
    container_name: ar24_mailhog
    ports:
      - "8025:8025"

volumes:
  db_data:
  